<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🎤 龍月花・雲龍蓮と話そう！</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h2 {
      color: #333;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    input, button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    input {
      width: 200px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
      background: #5a67d8;
    }
    button:active {
      transform: scale(0.95);
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #f7f7f7;
      border-radius: 10px;
      font-weight: bold;
    }
    .connected {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎤 龍月花・雲龍蓮と話そう！</h2>
    <p class="subtitle">同じルーム名を入れた人と話せるよ</p>

    <input id="channel" placeholder="ルーム名" value="Ryugekka">
    <button onclick="join()">🎙️ 参加</button>
    <button onclick="leave()">🚪 退出</button>

    <div class="status" id="status">💤 未接続</div>
  </div>

  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
  <script>
    const APP_ID = "8a10ad2855b44c9aa6cbcd991ea48d86";
    
    // ★★★ あなたのトークン（24時間有効）★★★
    const TOKEN = "007eJxTYHDm3xpo/IN7teAvkb0X7FZEr//lY7q/JtXy/329j8v45N8oMFgkGhokphhZmJommZgkWyYmmiUnpaZYWhqmJppYpFiYxTrdy2wIZGQ4vqWLiZEBAkF8DoagytL01OzsRAYGAPjZIiw=";
    
    let client = null;
    let localAudioTrack = null;
    let remoteUsers = {};

    async function join() {
      try {
        const channelName = document.getElementById("channel").value;
        if (!channelName) {
          alert("ルーム名を入れてね！");
          return;
        }

        const statusDiv = document.getElementById("status");
        statusDiv.innerText = "🎙️ 参加中...";
        statusDiv.className = "status";

        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        
        // 他の人が話し始めたら聞こえるようにする
        client.on("user-published", async (user, mediaType) => {
          await client.subscribe(user, mediaType);
          if (mediaType === "audio") {
            remoteUsers[user.uid] = user;
            user.audioTrack.play();
            const count = Object.keys(remoteUsers).length;
            statusDiv.innerText = `✅ 通話中（${count} 人と接続）`;
            statusDiv.className = "status connected";
          }
        });

        client.on("user-unpublished", (user) => {
          delete remoteUsers[user.uid];
          const count = Object.keys(remoteUsers).length;
          statusDiv.innerText = `✅ 通話中（${count} 人と接続）`;
        });

        client.on("user-left", (user) => {
          delete remoteUsers[user.uid];
          const count = Object.keys(remoteUsers).length;
          statusDiv.innerText = `✅ 通話中（${count} 人と接続）`;
        });

        // トークンを使って接続！
        await client.join(APP_ID, channelName, TOKEN, null);
        
        // マイクをON
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await client.publish([localAudioTrack]);
        
        statusDiv.innerText = `✅ 通話中（ルーム: ${channelName}）`;
        statusDiv.className = "status connected";
        
        console.log("参加成功！");
        
      } catch (err) {
        console.error(err);
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = `❌ エラー: ${err.message}`;
        statusDiv.className = "status error";
      }
    }

    async function leave() {
      if (localAudioTrack) {
        localAudioTrack.close();
        localAudioTrack = null;
      }
      if (client) {
        await client.leave();
        client = null;
      }
      remoteUsers = {};
      const statusDiv = document.getElementById("status");
      statusDiv.innerText = "💤 未接続";
      statusDiv.className = "status";
      console.log("退出しました");
    }

    // ページを閉じるときに退出
    window.addEventListener("beforeunload", () => {
      if (localAudioTrack) localAudioTrack.close();
      if (client) client.leave();
    });
  </script>
</body>
</html>
